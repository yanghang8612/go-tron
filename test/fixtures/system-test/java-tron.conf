block = {
  needSyncCheck = false
  # 5 minutes — matches genesis.json maintenance_time_interval and lets
  # dailyBuild vote/proposal cases settle within a single test budget.
  maintenanceTimeInterval = 300000
  # Same 5-minute window for proposals so vote → settle → check fits in
  # the test's polling loop. Default 3-day expiry would never fire.
  proposalExpireTime = 300000
}

vm = {
  supportConstant = true
  minTimeRatio = 0.0
  maxTimeRatio = 5.0
  # Flip to `true` to write per-tx JSON traces under ./vm_trace/<txhash>.json
  # (relative to java-tron's CWD = /tmp/system-test-stress/javatron). Each
  # trace records every opcode dispatched plus stack/memory/storage deltas
  # and remaining energy — invaluable for instruction-level divergence
  # diffs against gtron. Off by default because the per-op file IO is
  # measurable and accumulates large directories quickly.
  saveInternalTx = true
  vmTrace = true
}

# java-tron keeps the ENERGY_LIMIT fork behind the misspelled config key below.
# dailyBuild's TVM/TRC10 cases assume the post-fork path from genesis.
enery.limit.block.num = 0

# Full mainnet-current allow_* set so the daily-build suite can hit every
# feature gate at genesis. Mirrors the dynamic_properties block in
# test/fixtures/system-test/genesis.json. Keep in lock-step.
committee = {
  allowCreationOfContracts = 1
  allowMultiSign = 1
  allowAdaptiveEnergy = 0
  allowDelegateResource = 1
  allowSameTokenName = 1
  forbidTransferToContract = 1
  allowTvmTransferTrc10 = 1
  allowTvmConstantinople = 1
  allowTvmSolidity059 = 1
  allowShieldedTRC20Transaction = 1
  allowTvmIstanbul = 1
  changeDelegation = 1
  allowBlackHoleOptimization = 1
  allowTvmVote = 1
  allowTvmLondon = 1
  allowAssetOptimization = 1
  allowNewReward = 1
  memoFee = 1000000
  allowDelegateOptimization = 1
  allowDynamicEnergy = 1
  dynamicEnergyThreshold = 50000
  dynamicEnergyIncreaseFactor = 2000
  dynamicEnergyMaxFactor = 34000
  # NOTE: the Java field is `allowTvmShangHai` (capital H) — Typesafe
  # config binds by literal name, so the conventional spelling
  # `allowTvmShanghai` silently defaults to 0 and PUSH0 stays disabled.
  # See CommitteeConfig.java line 68.
  allowTvmShangHai = 1
  allowOldRewardOpt = 1
  allowEnergyAdjustment = 1
  allowStrictMath = 1
  allowTvmCancun = 1
  allowTvmCompatibleEvm = 1
  allowTvmBlob = 1
  allowOptimizedReturnValueOfChainId = 1
  allowNewResourceModel = 1
  allowAccountAssetOptimization = 1
  allowCancelAllUnfreezeV2 = 1
  allowTvmFreeze = 1
  allowMarketTransaction = 1
  allowOptimizeBlackHole = 1

  # Matches dynamic_properties.unfreeze_delay_days in test/fixtures/system-test/genesis.json.
  # With 14 here, both chains have supportUnfreezeDelay()=true → V1 freeze closed,
  # V2 freeze open. Without it, java-tron defaults to 0 and the two chains diverge
  # at the FIRST V1 freeze tx (caught by the 2026-05-15 stress run, block 18).
  unfreezeDelayDays = 14
}

log.level = {
  root = "INFO"
}
