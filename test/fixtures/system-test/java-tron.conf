## java-tron private chain config for the system-test stress harness.
##
## Topology: 1 java-tron process running 27 SRs simultaneously (multi-localwitness)
## so DPoS slot rotation produces a block every 3s. Block production stays under
## the dailyBuild test budget (each `waitProduceNextBlock` returns in ≤6s).
##
## Witness/account/proposal fixture is derived from
##   /Users/asuka/Projects/tron/system-test/testcase/src/test/resources/testng.conf
## so every (mainWitness|witness|foundationAccount).keyN referenced by dailyBuild
## resolves to a registered SR (mainWitness) or a funded account (witness/foundation).
##
## Differences from upstream config-localtest.conf:
##   1. Ports moved off mainnet defaults to avoid collision with the user's
##      ongoing gtron mainnet node:
##        P2P 28888, HTTP 28090, gRPC 50081, solidity gRPC 50091,
##        solidity HTTP 28091, JSON-RPC 50575.
##      scripts/system_test_stress.sh templates these into the staged
##      system-test testng.conf.
##   2. genesis.block.witnesses = 27 mainWitness addresses from testng.conf
##      `mainWitness.key1..key27`. localwitness gets all 27 priKeys so a single
##      java-tron process can sign every slot. The 5 `witness.keyN` addresses
##      are also registered with lower votes so vote/proposal tests can target
##      them without changing the active 27-slot schedule.
##   3. genesis.block.assets adds the 27 mainWitness addrs, the 5 `witness.keyN`
##      addrs and the 2 `foundationAccount.keyN` addrs with funded balance so
##      dailyBuild tests can broadcast from any of them.
##   4. maintenanceTimeInterval = 300_000 ms (5min) and proposalExpireTime same,
##      matching official config-system-test.conf. mainnet 21.6M ms (6h) would
##      time out every vote/proposal test.
##   5. [committee] block enables the full mainnet-current allow_* set so TVM
##      (Istanbul/London/Cancun/Shanghai), freeze-V2, delegate-resource,
##      strict-math, new-reward, etc. all open at genesis.
##   6. db.engine = "LEVELDB" kept for x86_64; on arm64 java-tron will
##      silently route to RocksDB regardless (see docs/dev/java-tron-local.md).

net {
  type = mainnet
}

storage {
  db.version = 2,
  db.engine = "LEVELDB",
  db.directory = "database",
  index.directory = "index",
  index.switch = "on"
  properties = []
}

node.discovery = {
  enable = true
  persist = true
  bind.ip = ""
  external.ip = null
}

node.backup {
  port = 10001
  priority = 8
  members = []
}

node {
  trustNode = "127.0.0.1:50081"
  walletExtensionApi = true
  listen.port = 28888
  connection.timeout = 2

  tcpNettyWorkThreadNum = 0
  udpNettyWorkThreadNum = 1

  connectFactor = 0.3
  activeConnectFactor = 0.1

  maxActiveNodes = 30
  maxActiveNodesWithSameIp = 10

  minParticipationRate = 0

  fullNodeAllowShieldedTransaction = true
  zenTokenId = 1000001

  disconnectNumberFactor = 0.4
  maxConnectNumberFactor = 0.8
  receiveTcpMinDataLength = 2048
  isOpenFullTcpDisconnect = true

  p2p {
    version = 333
  }

  active = []
  passive = []

  http {
    fullNodePort = 28090
    solidityPort = 28091
  }

  rpc {
    port = 50081
    solidityPort = 50091
    maxConnectionIdleInMillis = 60000
    minEffectiveConnection = 0
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 50575
    httpSolidityEnable = true
    httpSolidityPort = 50585
    httpPBFTEnable = false
  }
}

seed.node = {
  ip.list = []
}

