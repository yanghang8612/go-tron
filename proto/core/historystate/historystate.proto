syntax = "proto3";

// historystate.proto is a gtron-only addition (NOT imported from java-tron).
// It is the on-disk schema for the State History Index (SHI) feature — the
// reverse "(blockNum, key) → pre-value" log that lets archive nodes answer
// historical state queries without re-execution.
//
// See docs/superpowers/specs/2026-05-19-state-history-index-design.md for
// the design and the surrounding storage layout (sh-m-, sh-a-, sh-s-,
// sh-i-a-, sh-i-s-, sh-cfg- prefixes in core/rawdb/schema.go).

package gtron.history;

option go_package = "github.com/tronprotocol/go-tron/proto/core/historystate";

// StateHistoryMeta is the per-block manifest written under the sh-m- prefix.
// It records what the block changed so that read paths can bail out cheaply
// when a block didn't touch the queried key, and so that operators have a
// per-block summary for diagnostics and pruning.
message StateHistoryMeta {
  uint64 block_num   = 1;
  bytes  block_hash  = 2;  // 32-byte block hash for cross-checking on read
  uint32 num_addrs   = 3;  // count of sh-a- rows written for this block
  uint32 num_slots   = 4;  // count of sh-s- rows written for this block
  uint32 schema_ver  = 5;  // bump whenever the encoding/key layout changes
}

// AccountDelta captures the pre-block state of one account at one block, as
// a serialized blob. We capture the entire marshalled corepb.Account rather
// than mirroring its fields one-by-one for three reasons:
//
//  1. The Account proto evolves (shielded fields, freeze-V2 additions,
//     resource model refinements). A structured AccountDelta would force a
//     synchronized schema bump every time the upstream Account changes; a
//     blob survives field additions transparently.
//  2. Reconstruction is trivial: unmarshal account_proto_pre → done. No
//     field-by-field "apply rollback" merge logic to maintain.
//  3. The storage overhead (~150-400 B per touched account vs ~80 B for a
//     structured proto) is noise next to the ~2.4 TB mainnet archive total
//     called out in the spec.
//
// Code and contract metadata live OUTSIDE the Account proto in rawdb (under
// the c- and ct- prefixes respectively); they are mutable per account and
// can change independently of the Account row (SetCode, CREATE2 resurrect,
// SELFDESTRUCT-then-recreate-with-different-code). They are captured as
// separate pre-image blobs so the delta is self-sufficient for read paths.
//
// Slot storage (TVM contract storage cells) is NOT in this proto: those are
// captured by the sh-s- prefix with the raw 32-byte pre-value as the value
// — no per-row protobuf overhead, no per-slot wrapper.
message AccountDelta {
  // 21-byte TRON address. Redundant with the key (the rawdb key also embeds
  // the address) but kept inline so a row is self-describing for
  // pruning/diagnostics.
  bytes addr = 1;

  // existed_pre = false means the account did NOT exist before this block —
  // i.e. this block created it. Read paths use this sentinel to distinguish
  // a created-this-block account from one that merely had a zero-balance
  // pre-state. account_proto_pre/code_pre/contract_meta_pre are expected to
  // be empty when existed_pre = false.
  bool existed_pre = 2;

  // Marshalled corepb.Account at block N-1 (before this block's mutations).
  // Empty when existed_pre = false. Captures EVERY in-proto field —
  // balance, votes, asset/assetV2 maps, frozen/frozenV2/unfrozenV2 lists,
  // tron_power, old_tron_power, AccountResource sub-message, owner/
  // witness/active permissions, the resource sliding-window fields, etc.
  bytes account_proto_pre = 3;

  // Contract code at block N-1, if any (stored under the c- prefix in
  // rawdb, not inside the Account proto). Empty when the account had no
  // code pre-block. CREATE2-collide-then-recreate and SELFDESTRUCT-then-
  // recreate paths can change this independently of account_proto_pre.
  bytes code_pre = 4;

  // Marshalled contractpb.SmartContract at block N-1, if any (stored under
  // the ct- prefix in rawdb, not inside the Account proto). Empty when the
  // account had no contract metadata pre-block. Carries ABI + creator-
  // address fields that VM_actuator mutates.
  bytes contract_meta_pre = 5;

  // Reserved for future structured indexing if read paths ever benefit
  // from typed lookup without unmarshalling the full account. None today.
  reserved 6 to 19;
}

// HistoryConfig is the sentinel record at sh-cfg- describing the local
// history index's mode and retention window. Written once by operator
// startup logic; consulted by Slice 5's background pruner.
message HistoryConfig {
  // Logical mode: 0 = full (prune beyond prune_window), 1 = archive (keep
  // history forever). Wider enum room reserved for future modes.
  uint32 mode = 1;

  // For full mode only: blocks older than (solidified - prune_window) are
  // eligible for deletion. Ignored in archive mode.
  uint64 prune_window = 2;

  // Oldest block number with history available locally. 0 if the index is
  // empty. Maintained by the writer and the pruner.
  uint64 first_block = 3;

  // Newest block number with history available locally. 0 if the index is
  // empty. Bumped on every successful block commit.
  uint64 last_block = 4;

  // Schema version, in lockstep with StateHistoryMeta.schema_ver. A
  // mismatch at startup must refuse to launch with a clear "rebuild your
  // archive" error — see the spec's backwards-compat section.
  uint32 schema_ver = 5;
}

// =====================================================================
// Slice-1 StateDB audit — what AccountDelta must cover
// =====================================================================
//
// The blob (account_proto_pre) captures EVERY field of the corepb.Account
// proto, including:
//
//   Direct Account fields:
//     - account_name, account_id, type, is_witness, is_committee
//     - address, code (legacy in-Account code field; unused — code lives
//       under c- prefix), codeHash
//     - balance
//     - votes (repeated Vote)
//     - asset (legacy name-keyed TRC10 map)        ← AddTRC10BalanceFinal,
//     - assetV2 (tokenID-keyed TRC10 map)            SetTRC10Balance*,
//                                                    TransferAllTRC10Balance
//     - asset_issued_name, asset_issued_ID         ← SetAssetIssued
//     - asset_optimized
//     - latest_asset_operation_time{,V2}           ← SetLatestAssetOperationTime*
//     - free_asset_net_usage{,V2}                  ← SetFreeAssetNetUsage*
//
//   Frozen / power fields (V1 stake):
//     - frozen (repeated Frozen)                   ← FreezeV1Bandwidth,
//                                                    UnfreezeV1Bandwidth,
//                                                    RemoveExpiredFrozenBandwidth
//     - tron_power (Frozen)                        ← FreezeV1TronPower,
//                                                    UnfreezeV1TronPower
//     - old_tron_power                             ← Initialize/InvalidateOldTronPower
//     - acquired_delegated_frozen_balance_for_bandwidth, delegated_*  ← FreezeV1Delegated*
//     - frozen_supply (issuer-side)                ← AddFrozenSupply,
//                                                    RemoveExpiredFrozenSupply
//
//   Frozen-V2 (post-AllowNewResourceModel):
//     - frozenV2 (repeated FreezeV2)               ← AddFreezeV2, ReduceFreezeV2
//     - unfrozenV2 (repeated UnFreezeV2)           ← AddUnfreezeV2,
//                                                    RemoveExpiredUnfreezeV2,
//                                                    CancelAllUnfreezeV2,
//                                                    ClearUnfrozenV2
//     - delegated_frozenV2_balance_for_bandwidth   ← Add/SubDelegatedFrozenV2
//     - acquired_delegated_frozenV2_balance_for_bandwidth
//                                                  ← Add/SubAcquiredDelegatedFrozenV2,
//                                                    ClearAcquiredDelegatedResource
//
//   Resource sliding-window (bandwidth):
//     - net_usage, free_net_usage                  ← SetNetUsage, SetFreeNetUsage
//     - latest_consume_time, latest_consume_free_time
//                                                  ← SetLatestConsumeTime*
//     - latest_opration_time                       ← SetLatestOperationTime
//     - net_window_size, net_window_optimized
//
//   Allowance / reward:
//     - allowance                                  ← AddAllowance, SetAllowance
//     - latest_withdraw_time                       ← SetLatestWithdrawTime
//
//   Permissions:
//     - owner_permission                           ← SetPermissions,
//                                                    ApplyDefaultAccountPermissions,
//                                                    ApplyWitnessPermissions
//     - witness_permission
//     - active_permission (repeated)
//
//   create_time                                    ← CreateAccountWithTime
//
//   AccountResource sub-message:
//     - energy_usage                               ← SetEnergyUsage
//     - frozen_balance_for_energy (Frozen)         ← FreezeV1Energy, UnfreezeV1Energy,
//                                                    ClearFrozenEnergy
//     - latest_consume_time_for_energy             ← SetLatestConsumeTimeForEnergy
//     - acquired_delegated_frozen_balance_for_energy ← FreezeV1Delegated*Energy
//     - delegated_frozen_balance_for_energy
//     - storage_limit, storage_usage, latest_exchange_storage_time
//       (storage market — not currently written by gtron, but in proto)
//     - energy_window_size, energy_window_optimized
//     - delegated_frozenV2_balance_for_energy       ← Add/SubDelegatedFrozenV2 (energy)
//     - acquired_delegated_frozenV2_balance_for_energy
//                                                  ← Add/SubAcquiredDelegatedFrozenV2 (energy)
//
// Fields captured OUTSIDE the Account proto (so present as separate
// AccountDelta fields):
//   - code (under c- prefix)            → code_pre              ← SetCode, DeleteAccount
//   - SmartContract meta (ct- prefix)   → contract_meta_pre     ← SetContract,
//                                                                  DeleteAccount
//   - TVM storage slots (s- prefix)     → sh-s- rows            ← SetState
//
// Fields NOT covered by AccountDelta (deliberately, with rationale):
//
//   - Witness records (w- prefix): VoteCount, URL, TotalProduced,
//     TotalMissed, latestBlockNum, latestSlotNum, isJobs. These are NOT
//     per-account state in the AccountDelta sense — they live in a
//     separate witness store and only ~27 of them mutate per block.
//     A future WitnessDelta proto (or a per-block witness manifest)
//     would handle this; deferring to a later slice keeps slice 1
//     scoped.
//
//   - DynamicProperties (dp- prefix): chain-global counters (latest
//     solid block, witness schedule, vote-cycle cursors). These are
//     handled by a separate chain-level history mechanism; not part
//     of per-account deltas.
//
//   - Stores like AssetIssueStore, ExchangeStore, MarketOrder*: these
//     are chain-global object stores, not account-keyed state. Future
//     spec extension if/when archive queries need them.
//
//   - Delegation records (dr-, drax-): captured indirectly via the
//     account's acquired/delegated_frozen* fields. The standalone
//     DelegatedResource and DelegatedResourceAccountIndex rows are
//     derived from those values; archive queries that need the
//     denormalised form can recompute from AccountDelta.
//
// Audit verified against statedb.go @ master 0027b69 (2026-05-19).
// =====================================================================
