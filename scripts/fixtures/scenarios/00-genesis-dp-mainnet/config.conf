# Fixture scenario: 00-genesis-dp-mainnet
#
# Single-node private chain with the real mainnet genesis block and
# mainnet-default chain parameters. No witness configured — the chain
# stays at block 0, which is exactly what we want: we only observe
# java-tron's initial DynamicPropertiesStore state.

net {
  type = mainnet
}

storage {
  db.directory    = "database"
  index.directory = "index"
  db.engine       = "LEVELDB"
}

node {
  trustNode     = "127.0.0.1:18090"
  listen.port   = 19888
  connection.timeout = 2
  active = []
  passive = []
  fastForward = []
  maxConnections = 1
  minConnections = 0
  minActiveConnections = 0
  maxConnectionsWithSameIp = 0

  http {
    fullNodePort = 18090
    solidityPort = 18091
  }

  rpc {
    port = 18080
  }

  p2p {
    version = 11111  # mainnet network id
  }
}

